<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#3d4a2a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Humvee A2 Driver Trainer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="game"></div>

  <!-- Rotate-to-landscape hint (shown via CSS media query on portrait phones) -->
  <div id="rotate-hint">
    <div class="rotate-icon">&#128241;</div>
    <p data-i18n="rotate_hint">Rotate your device to landscape to play.</p>
  </div>

  <!-- Loading fallback while Phaser boots -->
  <noscript>This game requires JavaScript enabled in your browser.</noscript>

  <!-- Sentry browser SDK, pointed at Bugsink by js/bug-tracking.js. Global `Sentry`. -->
  <script src="js/vendor/sentry.browser.min.js"></script>

  <!-- Phaser 4.2.1 vendored locally (self-contained, offline-capable). Global `Phaser`. -->
  <script src="js/vendor/phaser.min.js"></script>

  <!-- Our game code as native ES modules (no build step). -->
  <script type="module" src="js/main.js"></script>
</body>
</html>

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/humvee-a2-educational-game-tc0hba
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Build TypeScript
        run: |
          npm ci
          npm run build
          rm -rf node_modules

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (Source: GitHub Actions) on first run if not already on.
          enablement: true

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          # The repo root is the static site after TypeScript compiles into js/.
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
